<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hexhaven</title>
    <!-- No-FOUC theme (T-505): stamp data-theme on <html> before first paint so the app never
         flashes the wrong theme. Mirrors theme/theme.ts: stored 'hexhaven.theme' choice wins; 'system'
         or none falls back to prefers-color-scheme. Kept inline + tiny + dependency-free. -->
    <script>
      (function () {
        try {
          var choice = localStorage.getItem('hexhaven.theme');
          var dark =
            choice === 'dark' ||
            ((choice === 'system' || choice === null) &&
              typeof window.matchMedia === 'function' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
