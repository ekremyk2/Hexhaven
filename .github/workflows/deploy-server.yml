name: Deploy server to Fly.io

# Deploys the backend (apps/server, the Fastify + WebSocket game server) to Fly.io using the
# repo's Dockerfile + fly.toml (app: hexhaven-web). This is the "back end" half of the split deploy;
# the client goes to GitHub Pages via pages.yml.
#
# One-time setup (needs your Fly.io account — CI can't create it for you):
#   1. Install flyctl + `fly auth login`
#   2. `fly launch --no-deploy` (reuse the existing fly.toml) OR `fly apps create hexhaven-web`
#   3. `fly tokens create deploy`  → copy the token
#   4. GitHub → Settings → Secrets and variables → Actions → New secret: FLY_API_TOKEN = <token>
#   5. (optional) `fly secrets set LOBBY_PASSWORD=…`
# After that, this runs on backend changes (or manually). Note: a deploy restarts the server, which
# drops any in-memory games (D-014).

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/engine/**"
      - "packages/shared/**"
      - "Dockerfile"
      - "fly.toml"
      - "pnpm-lock.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
